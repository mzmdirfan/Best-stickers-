<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Stickers</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
    font-family:'Inter',sans-serif;
    background:#0b0b0b;
    color:#fff;
    overflow-x:hidden;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    top:0;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    backdrop-filter: blur(15px);
    background: rgba(0,0,0,0.3);
    z-index:1000;
}

nav h2{
    font-family:'Sora';
}

nav a{
    color:#aaa;
    margin-left:20px;
    text-decoration:none;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    position:relative;
}

/* PARTICLES */
#particles{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:1;
}

/* TEXT */
.title{
    font-size:70px;
    font-family:'Sora';
    letter-spacing:-2px;
    position:relative;
    z-index:2;

    background: linear-gradient(90deg,#fff,#888);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.title span{
    display:inline-block;
    opacity:0;
    transform:translateY(50px);
    animation: letterAnim 0.8s ease forwards;
}

/* Letter delays */
.title span:nth-child(1){animation-delay:0.1s;}
.title span:nth-child(2){animation-delay:0.2s;}
.title span:nth-child(3){animation-delay:0.3s;}
.title span:nth-child(4){animation-delay:0.4s;}
.title span:nth-child(5){animation-delay:0.5s;}
.title span:nth-child(6){animation-delay:0.6s;}
.title span:nth-child(7){animation-delay:0.7s;}
.title span:nth-child(8){animation-delay:0.8s;}
.title span:nth-child(9){animation-delay:0.9s;}
.title span:nth-child(10){animation-delay:1s;}
.title span:nth-child(11){animation-delay:1.1s;}
.title span:nth-child(12){animation-delay:1.2s;}
.title span:nth-child(13){animation-delay:1.3s;}

@keyframes letterAnim{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.hero p{
    color:#888;
    margin-top:10px;
    z-index:2;
}

/* SECTION */
.section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
    opacity:0;
    transform:translateY(80px);
    transition:1s ease;
}

.section.active{
    opacity:1;
    transform:translateY(0);
}

/* CARD */
.card{
    max-width:600px;
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(20px);
}

.card img{
    width:100%;
    border-radius:15px;
    margin-bottom:20px;
}

/* BUTTON */
.btn{
    margin-top:15px;
    padding:10px 20px;
    background:white;
    color:black;
    border:none;
    border-radius:30px;
    cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
    font-size:20px;
}

/* DOT NAV */
.dots{
    position:fixed;
    right:20px;
    top:50%;
    transform:translateY(-50%);
}

.dots div{
    width:8px;
    height:8px;
    background:#555;
    border-radius:50%;
    margin:10px 0;
}

.dots .active{
    background:#fff;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- NAV -->
<nav>
    <h2>Best Stickers</h2>
    <div>
        <a href="#p1">Products</a>
        <a href="#p4">About</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1 class="title">
        <span>B</span><span>e</span><span>s</span><span>t</span>
        <span>&nbsp;</span>
        <span>S</span><span>t</span><span>i</span><span>c</span><span>k</span><span>e</span><span>r</span><span>s</span>
    </h1>
    <p>Modern. Clean. Premium.</p>
</section>

<!-- PRODUCT 1 -->
<section id="p1" class="section">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba">
        <h2>Vintage Cowboy</h2>
        <button class="btn" onclick="order('Cowboy')">Order</button>
    </div>
</section>

<!-- PRODUCT 2 -->
<section class="section">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1501706362039-c6e80948bb68">
        <h2>Wild Horse</h2>
        <button class="btn" onclick="order('Horse')">Order</button>
    </div>
</section>

<!-- PRODUCT 3 -->
<section class="section">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1608889175123-8ee362201f81">
        <h2>Desert Skull</h2>
        <button class="btn" onclick="order('Skull')">Order</button>
    </div>
</section>

<!-- ABOUT -->
<section id="p4" class="section">
    <div class="card">
        <h2>About</h2>
        <p>Premium sticker brand inspired by modern design.</p>
    </div>
</section>

<!-- DOTS -->
<div class="dots" id="dots"></div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX">💬</a>

<script>

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let p=[];
for(let i=0;i<60;i++){
    p.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        s:Math.random()*2,
        dx:(Math.random()-0.5)*0.5,
        dy:(Math.random()-0.5)*0.5
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    p.forEach(a=>{
        a.x+=a.dx;
        a.y+=a.dy;

        ctx.beginPath();
        ctx.arc(a.x,a.y,a.s,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
    });
    requestAnimationFrame(draw);
}
draw();

/* SCROLL ANIMATION */
const sections=document.querySelectorAll(".section");
const dotsContainer=document.getElementById("dots");

sections.forEach((_,i)=>{
    let d=document.createElement("div");
    dotsContainer.appendChild(d);
});

window.addEventListener("scroll", ()=>{
    let scrollY=window.scrollY;

    sections.forEach((sec,i)=>{
        let top=sec.offsetTop - window.innerHeight/2;

        if(scrollY > top){
            sec.classList.add("active");
            document.querySelectorAll(".dots div")[i]?.classList.add("active");
        }
    });
});

/* WHATSAPP */
function order(product){
    let num="91XXXXXXXXXX";
    window.open(`https://wa.me/${num}?text=I want ${product}`);
}

</script>

</body>
</html>
