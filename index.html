<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Stickers</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

/* Smooth scroll */
html {
    scroll-behavior: smooth;
}

/* Reset */
body {
    margin: 0;
    background: #faf8f5;
    font-family: 'Montserrat', sans-serif;
    color: #333;
}

/* Loader */
.loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #faf8f5;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    font-family: 'Playfair Display';
    font-size: 24px;
}

/* Container */
.container {
    max-width: 700px;
    margin: auto;
    padding: 60px 20px;
    text-align: center;
}

/* Title */
h1 {
    font-family: 'Playfair Display';
    font-size: 42px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1s ease forwards;
}

.subtitle {
    letter-spacing: 3px;
    color: #888;
    margin-bottom: 30px;
    opacity: 0;
    animation: fadeUp 1s ease forwards;
    animation-delay: 0.3s;
}

/* Divider */
.divider {
    width: 60px;
    height: 2px;
    background: #ccc;
    margin: 20px auto;
}

/* Section animation */
.section {
    opacity: 0;
    transform: translateY(40px);
    transition: 0.8s ease;
}

.section.show {
    opacity: 1;
    transform: translateY(0);
}

/* Product */
.product {
    margin: 50px 0;
}

.product img {
    width: 100%;
    border-radius: 10px;
    transition: 0.5s;
}

.product img:hover {
    transform: scale(1.05);
}

.product h3 {
    font-family: 'Playfair Display';
    margin-top: 15px;
}

.price {
    color: #777;
}

/* Button */
.btn {
    margin-top: 10px;
    padding: 10px 25px;
    border: 1px solid #333;
    background: transparent;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #333;
    color: white;
}

/* About */
.about {
    margin-top: 50px;
    line-height: 1.8;
    color: #555;
}

/* Animations */
@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<div class="loader" id="loader">Loading...</div>

<div class="container">

    <h1>Best Stickers</h1>
    <div class="subtitle">PREMIUM COLLECTION</div>

    <div class="divider"></div>

    <!-- PRODUCTS -->
    <div class="section">
        <div class="product">
            <img src="images/cowboy.png">
            <h3>Vintage Cowboy</h3>
            <div class="price">₹99</div>
            <button class="btn">Order</button>
        </div>
    </div>

    <div class="divider"></div>

    <div class="section">
        <div class="product">
            <img src="images/horse.jpg">
            <h3>Wild Horse</h3>
            <div class="price">₹149</div>
            <button class="btn">Order</button>
        </div>
    </div>

    <div class="divider"></div>

    <div class="section">
        <div class="product">
            <img src="images/skull.png">
            <h3>Desert Skull</h3>
            <div class="price">₹129</div>
            <button class="btn">Order</button>
        </div>
    </div>

    <!-- ABOUT -->
    <div class="section">
        <div class="divider"></div>
        <h2 style="font-family:Playfair Display;">About</h2>
        <div class="about">
            Best Stickers brings premium quality designs with modern aesthetics and smooth experience.
        </div>
    </div>

</div>

<script>

/* Loader */
window.onload = function() {
    document.getElementById("loader").style.display = "none";
}

/* Scroll animation */
const sections = document.querySelectorAll('.section');

window.addEventListener('scroll', () => {
    sections.forEach(sec => {
        const top = sec.getBoundingClientRect().top;
        if(top < window.innerHeight - 100) {
            sec.classList.add('show');
        }
    });
});

</script>

</body>
</html>
