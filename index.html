<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Stickers</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
    font-family:'Inter',sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color:#fff;
    overflow-x:hidden;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    top:0;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    backdrop-filter: blur(15px);
    background: rgba(0,0,0,0.3);
    z-index:1000;
}

nav h2{
    font-family:'Playfair Display';
}

nav a{
    color:#aaa;
    margin-left:20px;
    text-decoration:none;
}

nav a:hover{color:#fff;}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    position:relative;
    overflow:hidden;
}

/* PARTICLE CANVAS */
#particles{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:1;
}

.hero h1, .hero p{
    position:relative;
    z-index:2;
}

.hero h1{
    font-size:60px;
    font-family:'Playfair Display';
    background: linear-gradient(90deg,#fff,#aaa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* SECTION */
.section{
    max-width:1100px;
    margin:auto;
    padding:120px 20px;
    text-align:center;
}

/* REVEAL */
.reveal{
    opacity:0;
    transform:translateY(60px);
    transition:1.2s ease;
}
.reveal.active{
    opacity:1;
    transform:translateY(0);
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

.card{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius:20px;
    padding:20px;
    transition:0.5s;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.card:hover{
    transform:translateY(-15px) scale(1.03);
}

.card img{
    width:100%;
    border-radius:15px;
    transition:0.5s;
}

.card img:hover{
    transform:scale(1.08);
}

.card h3{
    margin-top:15px;
    font-family:'Playfair Display';
}

.price{
    color:#bbb;
}

/* BUTTON */
.btn{
    margin-top:10px;
    padding:10px 25px;
    border:none;
    background:linear-gradient(90deg,#444,#111);
    color:#fff;
    cursor:pointer;
    border-radius:30px;
}

/* ABOUT */
.about{
    color:#aaa;
    line-height:1.8;
    max-width:600px;
    margin:auto;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
    font-size:20px;
}

/* FOOTER */
footer{
    text-align:center;
    padding:40px;
    color:#666;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <h2>Best Stickers</h2>
    <div>
        <a href="#products">Products</a>
        <a href="#about">About</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <canvas id="particles"></canvas>
    <h1>Best Stickers</h1>
    <p>Luxury Sticker Experience</p>
</section>

<!-- PRODUCTS -->
<section id="products" class="section reveal">
    <h2 style="font-family:Playfair Display;">Our Collection</h2>

    <div class="products">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba">
            <h3>Vintage Cowboy</h3>
            <div class="price">₹99</div>
            <button class="btn" onclick="order('Vintage Cowboy')">Order</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1501706362039-c6e80948bb68">
            <h3>Wild Horse</h3>
            <div class="price">₹149</div>
            <button class="btn" onclick="order('Wild Horse')">Order</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1608889175123-8ee362201f81">
            <h3>Desert Skull</h3>
            <div class="price">₹129</div>
            <button class="btn" onclick="order('Desert Skull')">Order</button>
        </div>

    </div>
</section>

<!-- ABOUT -->
<section id="about" class="section reveal">
    <h2 style="font-family:Playfair Display;">About</h2>
    <div class="about">
        Best Stickers delivers premium quality designs with modern aesthetics.
    </div>
</section>

<footer>
    © 2026 Best Stickers
</footer>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX">💬</a>

<script>

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();

let particles = [];
for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2+1,
        speedX:(Math.random()-0.5)*0.5,
        speedY:(Math.random()-0.5)*0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        p.x+=p.speedX;
        p.y+=p.speedY;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();

        particles.forEach(p2=>{
            let dx=p.x-p2.x;
            let dy=p.y-p2.y;
            let dist=Math.sqrt(dx*dx+dy*dy);

            if(dist<100){
                ctx.beginPath();
                ctx.strokeStyle="rgba(255,255,255,0.1)";
                ctx.moveTo(p.x,p.y);
                ctx.lineTo(p2.x,p2.y);
                ctx.stroke();
            }
        });

        if(p.x<0)p.x=canvas.width;
        if(p.x>canvas.width)p.x=0;
        if(p.y<0)p.y=canvas.height;
        if(p.y>canvas.height)p.y=0;
    });

    requestAnimationFrame(animate);
}
animate();

/* REVEAL */
const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add('active');
        }
    });
});
document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));

/* WHATSAPP */
function order(product){
    let number="91XXXXXXXXXX";
    let msg=`Hello, I want to order ${product}`;
    window.open(`https://wa.me/${number}?text=${encodeURIComponent(msg)}`);
}

window.addEventListener("resize", resize);

</script>

</body>
</html>
