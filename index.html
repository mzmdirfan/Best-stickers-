<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Stickers</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(180deg, #faf8f5, #f0ebe5);
    color: #222;
    overflow-x: hidden;
}

/* SCROLL BAR */
#progress {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    background: #222;
    width: 0%;
    z-index: 9999;
}

/* NAVBAR */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.6);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    z-index: 999;
}

nav h2 {
    font-family: 'Playfair Display';
}

nav a {
    text-decoration: none;
    color: #333;
    margin-left: 20px;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;
}

.hero h1 {
    font-size: 48px;
    font-family: 'Playfair Display';
}

.hero p {
    margin-top: 10px;
    color: #777;
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 80px 20px;
}

/* PRODUCT GRID */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 15px;
    transition: 0.4s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.card:hover {
    transform: translateY(-10px);
}

.card img {
    width: 100%;
    border-radius: 10px;
    transition: 0.5s;
}

.card img:hover {
    transform: scale(1.05);
}

.card h3 {
    margin-top: 10px;
    font-family: 'Playfair Display';
}

.price {
    color: #666;
}

/* BUTTON */
.btn {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    background: #222;
    color: white;
    cursor: pointer;
}

/* SECTION ANIMATION */
.reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}

.reveal.active {
    opacity: 1;
    transform: translateY(0);
}

/* ABOUT */
.about {
    text-align: center;
    line-height: 1.8;
    color: #555;
}

/* FLOATING PARTICLES */
.particle {
    position: fixed;
    width: 6px;
    height: 6px;
    background: #ccc;
    border-radius: 50%;
    animation: float 10s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* WHATSAPP BUTTON */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 12px 15px;
    border-radius: 50%;
    font-size: 18px;
    text-decoration: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    color: #888;
}

</style>
</head>

<body>

<div id="progress"></div>

<!-- NAV -->
<nav>
    <h2>Best Stickers</h2>
    <div>
        <a href="#products">Products</a>
        <a href="#about">About</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Best Stickers</h1>
    <p>Premium Collection</p>
</section>

<!-- PRODUCTS -->
<section id="products" class="container reveal">
    <h2 style="text-align:center; font-family:Playfair Display;">Our Stickers</h2>

    <div class="products">

        <div class="card">
            <img src="images/cowboy.png">
            <h3>Vintage Cowboy</h3>
            <div class="price">₹99</div>
            <button class="btn">Order</button>
        </div>

        <div class="card">
            <img src="images/horse.jpg">
            <h3>Wild Horse</h3>
            <div class="price">₹149</div>
            <button class="btn">Order</button>
        </div>

        <div class="card">
            <img src="images/skull.png">
            <h3>Desert Skull</h3>
            <div class="price">₹129</div>
            <button class="btn">Order</button>
        </div>

    </div>
</section>

<!-- ABOUT -->
<section id="about" class="container reveal">
    <h2 style="text-align:center; font-family:Playfair Display;">About</h2>
    <div class="about">
        We create premium stickers with modern design and smooth experience.
    </div>
</section>

<footer>
    © 2026 Best Stickers
</footer>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX">💬</a>

<script>

/* SCROLL PROGRESS */
window.addEventListener('scroll', () => {
    let scroll = document.documentElement.scrollTop;
    let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    document.getElementById('progress').style.width = (scroll/height)*100 + "%";
});

/* REVEAL ANIMATION */
function reveal() {
    document.querySelectorAll('.reveal').forEach(el => {
        if(el.getBoundingClientRect().top < window.innerHeight - 100){
            el.classList.add('active');
        }
    });
}
window.addEventListener('scroll', reveal);

/* PARTICLES */
for(let i=0;i<20;i++){
    let p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random()*100 + "vw";
    p.style.animationDuration = (5 + Math.random()*5) + "s";
    document.body.appendChild(p);
}

</script>

</body>
</html>
