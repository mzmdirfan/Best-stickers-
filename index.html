<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Stickers</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #faf8f5;
    font-family: 'Montserrat', sans-serif;
    color: #333;
}

/* Center Layout */
.container {
    max-width: 700px;
    margin: auto;
    padding: 40px 20px;
    text-align: center;
}

/* Title */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 14px;
    letter-spacing: 3px;
    color: #888;
    margin-bottom: 30px;
}

/* Divider */
.divider {
    width: 60px;
    height: 2px;
    background: #ccc;
    margin: 20px auto;
}

/* Section Title */
h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    margin: 30px 0 10px;
}

/* Product */
.product {
    margin: 40px 0;
}

.product img {
    width: 100%;
    border-radius: 8px;
}

.product h3 {
    margin-top: 15px;
    font-family: 'Playfair Display';
}

.price {
    margin: 5px 0;
    font-size: 14px;
    color: #777;
}

.btn {
    margin-top: 10px;
    padding: 8px 20px;
    border: 1px solid #333;
    background: transparent;
    cursor: pointer;
}

.btn:hover {
    background: #333;
    color: white;
}

/* About */
.about {
    margin-top: 50px;
    font-size: 14px;
    line-height: 1.8;
    color: #555;
}

/* Footer */
footer {
    margin-top: 50px;
    font-size: 12px;
    color: #aaa;
}
</style>

</head>

<body>

<div class="container">

    <h1>Best Stickers</h1>
    <div class="subtitle">PREMIUM COLLECTION</div>

    <div class="divider"></div>

    <h2>Our Stickers</h2>

    <!-- Product 1 -->
    <div class="product">
        <img src="images/cowboy.png">
        <h3>Vintage Cowboy</h3>
        <div class="price">₹99</div>
        <button class="btn">Order</button>
    </div>

    <div class="divider"></div>

    <!-- Product 2 -->
    <div class="product">
        <img src="images/horse.jpg">
        <h3>Wild Horse</h3>
        <div class="price">₹149</div>
        <button class="btn">Order</button>
    </div>

    <div class="divider"></div>

    <!-- Product 3 -->
    <div class="product">
        <img src="images/skull.png">
        <h3>Desert Skull</h3>
        <div class="price">₹129</div>
        <button class="btn">Order</button>
    </div>

    <div class="divider"></div>

    <!-- ABOUT -->
    <h2>About</h2>

    <div class="about">
        Best Stickers brings you high-quality designs inspired by creativity,
        culture, and style. Simple, clean, and made for everyone.
    </div>

    <footer>
        © 2026 Best Stickers
    </footer>

</div>

</body>
</html>
