<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Stickers</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Inter',sans-serif;
    background:#0b0b0b;
    color:#fff;
    overflow-x:hidden;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.hero h1{
    font-size:70px;
    font-weight:600;
    letter-spacing:-2px;
}

.hero p{
    color:#888;
    margin-top:10px;
}

/* SECTIONS */
.section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
    opacity:0;
    transform:translateY(80px);
    transition:1s ease;
}

.section.active{
    opacity:1;
    transform:translateY(0);
}

/* CARD */
.card{
    max-width:600px;
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(20px);
}

/* IMAGE */
.card img{
    width:100%;
    border-radius:15px;
    margin-bottom:20px;
}

/* BUTTON */
.btn{
    margin-top:15px;
    padding:10px 20px;
    background:white;
    color:black;
    border:none;
    border-radius:30px;
    cursor:pointer;
}

/* SCROLL DOTS */
.dots{
    position:fixed;
    right:20px;
    top:50%;
    transform:translateY(-50%);
}

.dots div{
    width:8px;
    height:8px;
    background:#555;
    border-radius:50%;
    margin:10px 0;
    transition:0.3s;
}

.dots .active{
    background:#fff;
}

/* PARTICLES */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- HERO -->
<section class="hero">
    <h1>Best Stickers</h1>
    <p>Modern. Clean. Premium.</p>
</section>

<!-- PRODUCT 1 -->
<section class="section">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba">
        <h2>Vintage Cowboy</h2>
        <p>Classic western style sticker</p>
        <button class="btn" onclick="order('Cowboy')">Order</button>
    </div>
</section>

<!-- PRODUCT 2 -->
<section class="section">
    <div class="card">
        <img src="https://png.pngtree.com/thumb_back/fh260/background/20250825/pngtree-cowboy-riding-horse-in-wild-west-sunset-with-cactus-and-rocks-image_18056374.webp">
        <h2>Wild Horse</h2>
        <p>Symbol of freedom</p>
        <button class="btn" onclick="order('Horse')">Order</button>
    </div>
</section>

<!-- PRODUCT 3 -->
<section class="section">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1608889175123-8ee362201f81">
        <h2>Desert Skull</h2>
        <p>Bold & rugged design</p>
        <button class="btn" onclick="order('Skull')">Order</button>
    </div>
</section>

<!-- ABOUT -->
<section class="section">
    <div class="card">
        <h2>About</h2>
        <p>Premium sticker brand inspired by modern design and creativity.</p>
    </div>
</section>

<!-- DOT NAV -->
<div class="dots" id="dots"></div>

<script>

/* SCROLL ANIMATION */
const sections = document.querySelectorAll(".section");
const dotsContainer = document.getElementById("dots");

sections.forEach((_,i)=>{
    let dot=document.createElement("div");
    dotsContainer.appendChild(dot);
});

window.addEventListener("scroll", ()=>{
    let scrollY=window.scrollY;

    sections.forEach((sec,i)=>{
        let top=sec.offsetTop - window.innerHeight/2;

        if(scrollY > top){
            sec.classList.add("active");
            document.querySelectorAll(".dots div")[i]?.classList.add("active");
        }
    });
});

/* WHATSAPP */
function order(product){
    let num="919159419491";
    window.open(`https://wa.me/${num}?text=I want ${product}`);
}

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let p=[];
for(let i=0;i<60;i++){
    p.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        s:Math.random()*2,
        dx:(Math.random()-0.5)*0.5,
        dy:(Math.random()-0.5)*0.5
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    p.forEach(a=>{
        a.x+=a.dx;
        a.y+=a.dy;

        ctx.beginPath();
        ctx.arc(a.x,a.y,a.s,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
    });
    requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
